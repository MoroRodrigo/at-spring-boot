version: '3.8'

services:

  postgres:

    image: postgres:16

    container_name: postgres_hospital

    environment:
      POSTGRES_DB: hospital_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5433"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  hospital-api:

    build: .

    container_name: hospital_api

    depends_on:
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5433/hospital_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

    ports:
      - "8080:8080"

volumes:
  postgres_data:
